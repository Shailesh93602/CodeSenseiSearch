# Enhanced Production Docker Compose with Comprehensive Monitoring
# This extends the base production configuration with monitoring stack

version: '3.8'

services:
  # =============================================
  # Include all services from base production
  # =============================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: codesenseisearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codesenseisearch
      POSTGRES_USER: ${DB_USER:-codesenseisearch}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-codesenseisearch} -d codesenseisearch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesenseisearch

  redis:
    image: redis:7-alpine
    container_name: codesenseisearch-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - codesenseisearch

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: codesenseisearch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-codesenseisearch}:${DB_PASSWORD}@postgres:5432/codesenseisearch?schema=public&sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      CORS_ORIGINS: ${FRONTEND_URL}
      PORT: 3001
      # Monitoring configuration
      ENABLE_METRICS: true
      METRICS_PORT: 9090
    volumes:
      - api_logs:/app/logs
    ports:
      - "3001:3001"
      - "9090:9090"  # Metrics endpoint
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codesenseisearch

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: codesenseisearch-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:3001}
      PORT: 3000
      # Monitoring configuration
      ENABLE_METRICS: true
    volumes:
      - web_logs:/app/logs
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codesenseisearch

  # =============================================
  # Monitoring Stack
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: codesenseisearch-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - codesenseisearch
    depends_on:
      - api
      - web

  grafana:
    image: grafana/grafana:latest
    container_name: codesenseisearch-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - codesenseisearch
    depends_on:
      - prometheus

  # =============================================
  # Log Management
  # =============================================
  loki:
    image: grafana/loki:latest
    container_name: codesenseisearch-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - codesenseisearch

  promtail:
    image: grafana/promtail:latest
    container_name: codesenseisearch-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - api_logs:/var/log/api:ro
      - web_logs:/var/log/web:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - codesenseisearch
    depends_on:
      - loki

  # =============================================
  # Infrastructure Monitoring
  # =============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: codesenseisearch-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "9100:9100"
    networks:
      - codesenseisearch

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: codesenseisearch-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - codesenseisearch
    privileged: true
    devices:
      - /dev/kmsg

  # =============================================
  # Database Monitoring
  # =============================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: codesenseisearch-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-codesenseisearch}:${DB_PASSWORD}@postgres:5432/codesenseisearch?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - codesenseisearch
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: codesenseisearch-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    networks:
      - codesenseisearch
    depends_on:
      redis:
        condition: service_healthy

  # =============================================
  # Alerting
  # =============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: codesenseisearch-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - codesenseisearch

  # =============================================
  # Uptime Monitoring
  # =============================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: codesenseisearch-uptime
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    ports:
      - "3002:3001"
    networks:
      - codesenseisearch

# =============================================
# Enhanced Volumes for Monitoring
# =============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  web_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local
  uptime_data:
    driver: local

# =============================================
# Network Configuration
# =============================================
networks:
  codesenseisearch:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16