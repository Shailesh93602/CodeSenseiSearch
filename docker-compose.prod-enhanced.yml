# Enhanced Production Docker Compose Configuration
# This file sets up a production-ready environment with high availability and monitoring

version: '3.8'

services:
  # =============================================
  # Nginx Reverse Proxy with SSL
  # =============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: codesenseisearch-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl/:/etc/ssl/certs/:ro
      - ./docker/nginx/logs/:/var/log/nginx/
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - web
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - codesenseisearch
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # =============================================
  # Certbot for SSL Certificate Management
  # =============================================
  certbot:
    image: certbot/certbot:latest
    container_name: codesenseisearch-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - ./docker/ssl/:/scripts/:ro
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${ADMIN_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN} -d www.${DOMAIN}
    depends_on:
      - nginx
    networks:
      - codesenseisearch

  # =============================================
  # PostgreSQL Primary Database
  # =============================================
  postgres-primary:
    image: pgvector/pgvector:pg15
    container_name: codesenseisearch-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codesenseisearch}
      POSTGRES_USER: ${POSTGRES_USER:-codesenseisearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      # Replication settings
      POSTGRES_REPLICATION_MODE: master
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      # Performance optimization
      POSTGRES_SHARED_PRELOAD_LIBRARIES: 'pg_stat_statements,auto_explain,vector'
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./scripts/init-production-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/create-indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
      - postgres_logs:/var/log/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codesenseisearch} -d ${POSTGRES_DB:-codesenseisearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesenseisearch
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # =============================================
  # PostgreSQL Read Replica (Optional)
  # =============================================
  postgres-replica:
    image: pgvector/pgvector:pg15
    container_name: codesenseisearch-postgres-replica
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codesenseisearch}
      POSTGRES_USER: ${POSTGRES_USER:-codesenseisearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Replication settings
      POSTGRES_REPLICATION_MODE: slave
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_MASTER_SERVER: postgres-primary
      POSTGRES_MASTER_PORT: 5432
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    depends_on:
      - postgres-primary
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codesenseisearch} -d ${POSTGRES_DB:-codesenseisearch}"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - codesenseisearch
    profiles:
      - replica
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # =============================================
  # Redis Primary Instance
  # =============================================
  redis-primary:
    image: redis:7-alpine
    container_name: codesenseisearch-redis-primary
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --timeout 300
      --tcp-keepalive 300
      --tcp-backlog 511
      --databases 16
      --loglevel notice
    volumes:
      - redis_primary_data:/data
      - redis_logs:/var/log/redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - codesenseisearch
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1.2G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'

  # =============================================
  # Redis Sentinel for High Availability
  # =============================================
  redis-sentinel:
    image: redis:7-alpine
    container_name: codesenseisearch-redis-sentinel
    restart: unless-stopped
    command: >
      redis-sentinel /etc/redis/sentinel.conf
      --sentinel
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    ports:
      - "26379:26379"
    depends_on:
      - redis-primary
    networks:
      - codesenseisearch
    profiles:
      - sentinel
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # =============================================
  # Web Application (Next.js)
  # =============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
      args:
        NODE_ENV: production
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-codesenseisearch}/web:${IMAGE_TAG:-latest}
    container_name: codesenseisearch-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-codesenseisearch}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB:-codesenseisearch}
      DATABASE_READ_REPLICA_URL: postgresql://${POSTGRES_USER:-codesenseisearch}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-codesenseisearch}
      # Redis
      REDIS_URL: redis://redis-primary:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Authentication
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      # External APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      # Performance
      NODE_OPTIONS: "--max-old-space-size=2048"
    volumes:
      - app_logs:/app/logs
      - static_files:/app/.next/static
    ports:
      - "3000:3000"
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - codesenseisearch
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # =============================================
  # API Application (NestJS)
  # =============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
      args:
        NODE_ENV: production
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-codesenseisearch}/api:${IMAGE_TAG:-latest}
    container_name: codesenseisearch-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-codesenseisearch}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB:-codesenseisearch}
      DATABASE_READ_REPLICA_URL: postgresql://${POSTGRES_USER:-codesenseisearch}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-codesenseisearch}
      # Redis
      REDIS_URL: redis://redis-primary:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_REDIS_URL: redis://redis-primary:6379/1
      # Authentication
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      # External APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN}
      STACKOVERFLOW_API_KEY: ${STACKOVERFLOW_API_KEY}
      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      # Performance
      NODE_OPTIONS: "--max-old-space-size=2048"
    volumes:
      - api_logs:/app/logs
      - upload_files:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - codesenseisearch
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # =============================================
  # Background Worker for Processing Jobs
  # =============================================
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-codesenseisearch}/api:${IMAGE_TAG:-latest}
    container_name: codesenseisearch-worker-prod
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-codesenseisearch}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB:-codesenseisearch}
      # Redis
      REDIS_URL: redis://redis-primary:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_REDIS_URL: redis://redis-primary:6379/1
      # External APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN}
      STACKOVERFLOW_API_KEY: ${STACKOVERFLOW_API_KEY}
      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      # Worker specific
      WORKER_CONCURRENCY: 5
      WORKER_MAX_JOBS: 100
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      # Performance
      NODE_OPTIONS: "--max-old-space-size=1024"
    volumes:
      - worker_logs:/app/logs
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - codesenseisearch
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # =============================================
  # Prometheus Monitoring
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: codesenseisearch-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - codesenseisearch
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # =============================================
  # Grafana Dashboard
  # =============================================
  grafana:
    image: grafana/grafana:latest
    container_name: codesenseisearch-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_DOMAIN: ${DOMAIN}
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    networks:
      - codesenseisearch
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # =============================================
  # Node Exporter for System Metrics
  # =============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: codesenseisearch-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - codesenseisearch
    profiles:
      - monitoring

# =============================================
# Networks
# =============================================
networks:
  codesenseisearch:
    name: codesenseisearch-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================
# Volumes
# =============================================
volumes:
  # Database volumes
  postgres_primary_data:
    name: codesenseisearch-postgres-primary-data
    driver: local
  postgres_replica_data:
    name: codesenseisearch-postgres-replica-data
    driver: local
  postgres_logs:
    name: codesenseisearch-postgres-logs
    driver: local

  # Redis volumes
  redis_primary_data:
    name: codesenseisearch-redis-primary-data
    driver: local
  redis_logs:
    name: codesenseisearch-redis-logs
    driver: local

  # Application volumes
  app_logs:
    name: codesenseisearch-app-logs
    driver: local
  api_logs:
    name: codesenseisearch-api-logs
    driver: local
  worker_logs:
    name: codesenseisearch-worker-logs
    driver: local
  static_files:
    name: codesenseisearch-static-files
    driver: local
  upload_files:
    name: codesenseisearch-upload-files
    driver: local

  # SSL/Certificate volumes
  certbot_certs:
    name: codesenseisearch-certbot-certs
    driver: local
  certbot_webroot:
    name: codesenseisearch-certbot-webroot
    driver: local

  # Monitoring volumes
  prometheus_data:
    name: codesenseisearch-prometheus-data
    driver: local
  grafana_data:
    name: codesenseisearch-grafana-data
    driver: local