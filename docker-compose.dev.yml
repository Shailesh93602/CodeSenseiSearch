# Development Docker Compose Configuration
# This file sets up the development environment with hot reloading and debugging

version: '3.8'

services:
  # =============================================
  # PostgreSQL Database with pgvector
  # =============================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: codesenseisearch-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: codesenseisearch_dev
      POSTGRES_USER: codesenseisearch
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesenseisearch -d codesenseisearch_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesenseisearch-dev

  # =============================================
  # Redis Cache and Queue
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: codesenseisearch-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --requirepass dev_redis_123
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - codesenseisearch-dev

  # =============================================
  # Redis Commander (Redis GUI)
  # =============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: codesenseisearch-redis-gui
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379:0:dev_redis_123
    ports:
      - "8081:8081"
    networks:
      - codesenseisearch-dev

  # =============================================
  # pgAdmin (PostgreSQL GUI)
  # =============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: codesenseisearch-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codesenseisearch.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    ports:
      - "8080:80"
    networks:
      - codesenseisearch-dev

  # =============================================
  # Mailhog (Email Testing)
  # =============================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: codesenseisearch-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - codesenseisearch-dev

# =============================================
# Named Volumes for Development Persistence
# =============================================
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local

# =============================================
# Network Configuration
# =============================================
networks:
  codesenseisearch-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16