# Promtail Configuration for CodeSenseiSearch
# Promtail is an agent which ships the contents of local logs to a Loki instance

server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Loki client configuration
clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: codesenseisearch

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          service: system
          __path__: /var/log/*log

  # Docker container logs
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_logging_jobname']
        target_label: 'job'

  # CodeSenseiSearch API logs
  - job_name: api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          service: codesenseisearch-api
          __path__: /app/logs/api/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            request_id: request_id
            user_id: user_id
            method: method
            url: url
            status_code: status_code
            response_time: response_time
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          request_id:
          method:
          status_code:

  # CodeSenseiSearch Web logs
  - job_name: web-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: web
          service: codesenseisearch-web
          __path__: /app/logs/web/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            user_id: user_id
            page: page
            action: action
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          page:
          action:

  # Nginx access logs
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          log_type: access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<request>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)" "(?P<http_x_forwarded_for>[^"]*)"'
      - timestamp:
          source: time_local
          format: 02/Jan/2006:15:04:05 -0700
      - labels:
          method:
          status:
          remote_addr:

  # Nginx error logs
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          log_type: error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*)'
      - timestamp:
          source: timestamp
          format: 2006/01/02 15:04:05
      - labels:
          level:
          pid:

  # PostgreSQL logs
  - job_name: postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          service: postgresql
          __path__: /var/log/postgresql/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \w+) \[(?P<pid>\d+)\] (?P<level>\w+):  (?P<message>.*)'
      - timestamp:
          source: timestamp
          format: 2006-01-02 15:04:05.000 MST
      - labels:
          level:
          pid:

  # Redis logs
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          service: redis
          __path__: /var/log/redis/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<pid>\d+):(?P<role>\w) (?P<timestamp>\d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<level>[*#-]) (?P<message>.*)'
      - timestamp:
          source: timestamp
          format: 02 Jan 2006 15:04:05.000
      - labels:
          level:
          role:
          pid:

  # Application error logs
  - job_name: app-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-errors
          service: codesenseisearch
          __path__: /app/logs/errors/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            error: error
            stack: stack
            request_id: request_id
            user_id: user_id
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          request_id:

  # Security logs
  - job_name: security
    static_configs:
      - targets:
          - localhost
        labels:
          job: security
          service: security
          __path__: /app/logs/security/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event_type: event_type
            user_id: user_id
            ip_address: ip_address
            user_agent: user_agent
            success: success
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          event_type:
          success:

  # Search logs
  - job_name: search
    static_configs:
      - targets:
          - localhost
        labels:
          job: search
          service: search-engine
          __path__: /app/logs/search/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            query: query
            results_count: results_count
            response_time: response_time
            user_id: user_id
            search_type: search_type
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          search_type:
          user_id: