# Redis Sentinel Configuration for CodeSenseiSearch Production
# This file configures Redis Sentinel for high availability monitoring

# Port that this sentinel instance will run on
port 26379

# Sentinel announce-ip is used to announce the IP address this sentinel
# is reachable from. This is useful in container environments where
# the actual IP may be different from the exposed IP.
# sentinel announce-ip 192.168.1.100

# Sentinel announce-port is used to announce the port this sentinel
# is listening on. This is useful when using port mapping.
# sentinel announce-port 26379

# The working directory for Sentinel
dir /tmp

# Master monitoring configuration
# Format: sentinel monitor <master-name> <ip> <redis-port> <quorum>
# The quorum is the number of Sentinels that need to agree about the fact
# the master is not reachable, in order to really mark the master as failing,
# and eventually start a failover procedure if possible.
sentinel monitor codesenseisearch-master redis-primary 6379 2

# Master authentication (if Redis has requirepass set)
sentinel auth-pass codesenseisearch-master ${REDIS_PASSWORD}

# How long (in milliseconds) a master or slave is considered to be
# not reachable by Sentinel
sentinel down-after-milliseconds codesenseisearch-master 5000

# How many slaves can be reconfigured to use the new master after
# a failover at the same time. Use a low number if you have slow slaves.
sentinel parallel-syncs codesenseisearch-master 1

# Timeout for failover in milliseconds
sentinel failover-timeout codesenseisearch-master 10000

# Deny dangerous commands (can be enabled in production)
sentinel deny-scripts-reconfig yes

# Logging configuration
loglevel notice
logfile /var/log/redis/sentinel.log

# Background mode
daemonize no

# PID file
pidfile /var/run/redis-sentinel.pid

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Security
protected-mode yes
# bind 127.0.0.1 ::1

# TCP keepalive
tcp-keepalive 300

# Timeout for client connections
timeout 300

# TCP listen() backlog
tcp-backlog 511

# TLS/SSL configuration (if using encryption)
# tls-port 26380
# tls-cert-file /etc/ssl/certs/sentinel.crt
# tls-key-file /etc/ssl/private/sentinel.key
# tls-ca-cert-file /etc/ssl/certs/ca.crt

# Notification scripts (optional)
# These scripts are executed when certain events occur

# Script to execute when a master changes
# sentinel notification-script codesenseisearch-master /scripts/notify-master-change.sh

# Script to execute when failover starts  
# sentinel client-reconfig-script codesenseisearch-master /scripts/failover-start.sh

# Replica configuration
# sentinel known-replica codesenseisearch-master redis-replica 6379

# Sentinel announce configuration for container environments
# This helps with service discovery in Docker/Kubernetes
# sentinel announce-ip <your-sentinel-ip>
# sentinel announce-port 26379

# Performance tuning
hz 10

# Memory usage optimization
sentinel resolve-hostnames yes
sentinel announce-hostnames yes