# Production Docker Compose Configuration
# This file sets up the production environment with all services

version: '3.8'

services:
  # =============================================
  # PostgreSQL Database with pgvector
  # =============================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: codesenseisearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codesenseisearch
      POSTGRES_USER: ${DB_USER:-codesenseisearch}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-codesenseisearch} -d codesenseisearch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesenseisearch

  # =============================================
  # Redis Cache and Queue
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: codesenseisearch-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - codesenseisearch

  # =============================================
  # NestJS API Backend
  # =============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: codesenseisearch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-codesenseisearch}:${DB_PASSWORD}@postgres:5432/codesenseisearch?schema=public&sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      CORS_ORIGINS: ${FRONTEND_URL}
      PORT: 3001
    volumes:
      - api_logs:/app/logs
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codesenseisearch
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.codesenseisearch.com`)"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

  # =============================================
  # Next.js Frontend
  # =============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: codesenseisearch-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:3001}
      PORT: 3000
    volumes:
      - web_logs:/app/logs
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codesenseisearch
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`codesenseisearch.com`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # =============================================
  # Reverse Proxy & Load Balancer (Traefik)
  # =============================================
  traefik:
    image: traefik:v3.0
    container_name: codesenseisearch-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - codesenseisearch
    labels:
      - "traefik.enable=true"

  # =============================================
  # Monitoring Stack (Optional)
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: codesenseisearch-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - codesenseisearch

  grafana:
    image: grafana/grafana:latest
    container_name: codesenseisearch-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - codesenseisearch

# =============================================
# Named Volumes for Persistence
# =============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  web_logs:
    driver: local
  traefik_letsencrypt:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================
# Network Configuration
# =============================================
networks:
  codesenseisearch:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16