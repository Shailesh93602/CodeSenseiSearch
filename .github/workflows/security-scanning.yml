name: Security Scanning & Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # =============================================
  # Static Code Analysis
  # =============================================
  static-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint Security Plugin
        run: |
          npm install eslint-plugin-security --save-dev
          npx eslint . --ext .js,.jsx,.ts,.tsx --format json --output-file eslint-results.json || true

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results
          path: eslint-results.json

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/typescript
            p/react
            p/nextjs
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          publishDeployment: true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # =============================================
  # Dependency Vulnerability Scanning
  # =============================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json || true
          
          # Check for high/critical vulnerabilities
          HIGH_VULNS=$(cat npm-audit-results.json | jq '.vulnerabilities | to_entries[] | select(.value.severity == "high" or .value.severity == "critical") | length' | wc -l)
          
          if [[ $HIGH_VULNS -gt 0 ]]; then
            echo "❌ Found $HIGH_VULNS high/critical vulnerabilities"
            cat npm-audit-results.json | jq '.vulnerabilities | to_entries[] | select(.value.severity == "high" or .value.severity == "critical")'
            exit 1
          else
            echo "✅ No high/critical vulnerabilities found"
          fi

      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json > snyk-results.json

      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results
          path: snyk-results.json

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CodeSenseiSearch'
          path: '.'
          format: 'JSON'
          args: >
            --enableRetired
            --enableExperimental
            --nodeAuditSkipDevDependencies

      - name: Upload OWASP results
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-results
          path: reports

  # =============================================
  # Container Image Scanning
  # =============================================
  container-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    strategy:
      matrix:
        service: [api, web]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: codesenseisearch-${{ matrix.service }}:scan
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'codesenseisearch-${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}-results.sarif'

      - name: Run Snyk container scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: 'codesenseisearch-${{ matrix.service }}:scan'
          args: --severity-threshold=high

      - name: Run Anchore container scan
        uses: anchore/scan-action@v3
        with:
          image: 'codesenseisearch-${{ matrix.service }}:scan'
          fail-build: true
          severity-cutoff: high

  # =============================================
  # Secrets Scanning
  # =============================================
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run detect-secrets
        run: |
          pip install detect-secrets
          
          # Generate baseline
          detect-secrets scan --all-files --exclude-files package-lock.json --exclude-files pnpm-lock.yaml > .secrets.baseline
          
          # Check for new secrets
          detect-secrets audit .secrets.baseline --diff

  # =============================================
  # Infrastructure Security Scan
  # =============================================
  infrastructure-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        if: env.USE_TERRAFORM == 'true'

      - name: Run Checkov (Infrastructure as Code Security)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: true
          soft_fail: true
          framework: dockerfile,docker_compose,secrets,github_actions

      - name: Run Terrascan
        uses: accurics/terrascan-action@main
        if: env.USE_TERRAFORM == 'true'
        with:
          iac_type: 'terraform'
          iac_version: 'v14'
          policy_type: 'aws'
          only_warn: true

      - name: Scan Docker Compose files
        run: |
          # Custom security checks for Docker Compose
          echo "Checking Docker Compose security configurations..."
          
          # Check for privileged containers
          if grep -r "privileged.*true" docker-compose*.yml; then
            echo "❌ Found privileged containers"
            exit 1
          fi
          
          # Check for host network mode
          if grep -r "network_mode.*host" docker-compose*.yml; then
            echo "⚠️ Found host network mode usage"
          fi
          
          # Check for volume mounts to sensitive paths
          if grep -r ":/etc\|:/var/run/docker.sock\|:/proc\|:/sys" docker-compose*.yml; then
            echo "⚠️ Found potentially sensitive volume mounts"
          fi
          
          echo "✅ Docker Compose security check completed"

  # =============================================
  # Web Application Security Testing
  # =============================================
  web-security-test:
    name: Web Application Security Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: codesenseisearch_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: |
          npm run build
          npm run start &
          
          # Wait for application to start
          sleep 30
          
          # Verify application is running
          curl -f http://localhost:3000/health || exit 1
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/codesenseisearch_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Run Nuclei Security Scanner
        uses: projectdiscovery/nuclei-action@main
        with:
          target: 'http://localhost:3000'
          templates: 'cves,exposures,technologies,misconfiguration'

  # =============================================
  # Security Report Generation
  # =============================================
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [static-analysis, dependency-scan, container-scan, secrets-scan, infrastructure-scan, web-security-test]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate security report
        run: |
          echo "# CodeSenseiSearch Security Report" > security-report.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> security-report.md
          echo "" >> security-report.md
          
          echo "## Summary" >> security-report.md
          echo "| Component | Status |" >> security-report.md
          echo "|-----------|--------|" >> security-report.md
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> security-report.md
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> security-report.md
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> security-report.md
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} |" >> security-report.md
          echo "| Infrastructure Scan | ${{ needs.infrastructure-scan.result }} |" >> security-report.md
          echo "| Web Security Test | ${{ needs.web-security-test.result }} |" >> security-report.md
          echo "" >> security-report.md
          
          echo "## Detailed Results" >> security-report.md
          
          # Process npm audit results if available
          if [[ -f npm-audit-results.json ]]; then
            echo "### NPM Audit Results" >> security-report.md
            TOTAL_VULNS=$(cat npm-audit-results.json | jq '.metadata.vulnerabilities.total // 0')
            echo "Total vulnerabilities found: $TOTAL_VULNS" >> security-report.md
            echo "" >> security-report.md
          fi
          
          # Add recommendations
          echo "## Security Recommendations" >> security-report.md
          echo "1. Regularly update dependencies to patch known vulnerabilities" >> security-report.md
          echo "2. Implement proper input validation and sanitization" >> security-report.md
          echo "3. Use HTTPS for all external communications" >> security-report.md
          echo "4. Implement proper authentication and authorization" >> security-report.md
          echo "5. Regular security audits and penetration testing" >> security-report.md
          echo "" >> security-report.md
          
          echo "## Next Steps" >> security-report.md
          echo "- Review and address any high/critical vulnerabilities" >> security-report.md
          echo "- Update security policies and procedures as needed" >> security-report.md
          echo "- Schedule next security review" >> security-report.md
          
          cat security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

      - name: Comment on PR with security summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Scan Results\n\n${report}`
            });

      - name: Notify security team
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: '🚨 Security scan found critical issues that require immediate attention'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_SLACK_WEBHOOK_URL }}

  # =============================================
  # Compliance Check
  # =============================================
  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for required security files
        run: |
          echo "Checking for required security and compliance files..."
          
          # Security policy
          if [[ -f "SECURITY.md" ]]; then
            echo "✅ SECURITY.md found"
          else
            echo "❌ SECURITY.md missing"
            exit 1
          fi
          
          # Privacy policy
          if [[ -f "PRIVACY.md" ]] || grep -r "privacy" docs/ apps/web/src/pages/ || true; then
            echo "✅ Privacy policy documentation found"
          else
            echo "⚠️ Privacy policy documentation not found"
          fi
          
          # License file
          if [[ -f "LICENSE" ]]; then
            echo "✅ LICENSE file found"
          else
            echo "❌ LICENSE file missing"
            exit 1
          fi
          
          # Code of conduct
          if [[ -f "CODE_OF_CONDUCT.md" ]]; then
            echo "✅ CODE_OF_CONDUCT.md found"
          else
            echo "⚠️ CODE_OF_CONDUCT.md missing"
          fi

      - name: Check environment variable security
        run: |
          echo "Checking for secure environment variable handling..."
          
          # Check for hardcoded secrets
          if grep -r "password\|secret\|key\|token" --include="*.js" --include="*.ts" --include="*.jsx" --include="*.tsx" apps/ | grep -v "process.env" | grep -v ".env" | grep -v "PASSWORD" | grep -v "SECRET" | grep -v "KEY" | grep -v "TOKEN"; then
            echo "⚠️ Potential hardcoded secrets found"
          else
            echo "✅ No hardcoded secrets detected"
          fi
          
          # Check for proper environment variable usage
          if grep -r "process.env" apps/ | head -5; then
            echo "✅ Environment variables are being used"
          fi

      - name: Check HTTPS enforcement
        run: |
          echo "Checking for HTTPS enforcement..."
          
          # Check Next.js security headers
          if grep -r "X-Frame-Options\|X-Content-Type-Options\|X-XSS-Protection" apps/web/ || grep -r "securityHeaders" apps/web/; then
            echo "✅ Security headers configuration found"
          else
            echo "⚠️ Security headers configuration not found"
          fi
          
          # Check for HTTPS redirects in Nginx config
          if grep -r "return 301 https" docker/nginx/ || grep -r "ssl" docker/nginx/; then
            echo "✅ HTTPS enforcement found in Nginx config"
          else
            echo "⚠️ HTTPS enforcement not found in Nginx config"
          fi

      - name: Generate compliance report
        run: |
          echo "# Compliance Check Report" > compliance-report.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> compliance-report.md
          echo "" >> compliance-report.md
          echo "## Security Standards Compliance" >> compliance-report.md
          echo "- [x] Security policy documentation" >> compliance-report.md
          echo "- [x] License file present" >> compliance-report.md
          echo "- [x] Environment variable security" >> compliance-report.md
          echo "- [x] HTTPS enforcement" >> compliance-report.md
          echo "" >> compliance-report.md
          echo "## Recommendations" >> compliance-report.md
          echo "- Regular security training for development team" >> compliance-report.md
          echo "- Implement automated compliance monitoring" >> compliance-report.md
          echo "- Regular third-party security audits" >> compliance-report.md

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.md