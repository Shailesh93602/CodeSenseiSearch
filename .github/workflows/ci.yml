# CI — runs on every push to main + every pull request.
#
# Validates the things we'd refuse to merge without: type-check, lint,
# all unit / integration tests in both apps, and the Playwright E2E
# suite for the web app. No deploys here — that's the deploy
# workflow's job.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new commit lands —
# saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — the action reads packageManager from
      # package.json so we can't drift between local and CI.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test
        env:
          NODE_ENV: test

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — the action reads packageManager from
      # package.json so we can't drift between local and CI.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint
        continue-on-error: true # next-lint nit-warnings shouldn't fail PRs yet

      - name: Vitest unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E
        run: pnpm test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
