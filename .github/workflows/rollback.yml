name: Deployment Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      rollback_target:
        description: 'Rollback target'
        required: true
        type: choice
        options:
          - previous_version
          - specific_commit
          - last_stable
      commit_sha:
        description: 'Specific commit SHA (only if rollback_target is specific_commit)'
        required: false
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================
  # Validate Rollback Request
  # =============================================
  validate-rollback:
    name: Validate Rollback Request
    runs-on: ubuntu-latest
    
    outputs:
      target_commit: ${{ steps.determine-target.outputs.target_commit }}
      target_tag: ${{ steps.determine-target.outputs.target_tag }}
      current_version: ${{ steps.get-current.outputs.current_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current deployment version
        id: get-current
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            HOST=${{ secrets.PRODUCTION_HOST }}
            USER=${{ secrets.PRODUCTION_USER }}
            SSH_KEY=${{ secrets.PRODUCTION_SSH_KEY }}
          else
            HOST=${{ secrets.STAGING_HOST }}
            USER=${{ secrets.STAGING_USER }}
            SSH_KEY=${{ secrets.STAGING_SSH_KEY }}
          fi
          
          # Get currently deployed image tag
          CURRENT_VERSION=$(ssh -o StrictHostKeyChecking=no -i <(echo "$SSH_KEY") $USER@$HOST '
            docker inspect $(docker ps --filter "name=codesenseisearch-web" --format "{{.ID}}") --format "{{index .Config.Labels \"org.opencontainers.image.revision\"}}"
          ')
          
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current deployment version: $CURRENT_VERSION"

      - name: Determine rollback target
        id: determine-target
        run: |
          case "${{ github.event.inputs.rollback_target }}" in
            "previous_version")
              # Get the commit before the current one from main branch
              TARGET_COMMIT=$(git log --format="%H" -n 2 origin/main | tail -1)
              ;;
            "specific_commit")
              if [[ -z "${{ github.event.inputs.commit_sha }}" ]]; then
                echo "❌ Commit SHA required when rollback_target is specific_commit"
                exit 1
              fi
              TARGET_COMMIT="${{ github.event.inputs.commit_sha }}"
              
              # Validate commit exists
              if ! git cat-file -e "$TARGET_COMMIT"; then
                echo "❌ Commit $TARGET_COMMIT does not exist"
                exit 1
              fi
              ;;
            "last_stable")
              # Get the last commit tagged as stable
              TARGET_COMMIT=$(git rev-list -n 1 $(git tag -l "v*" --sort=-version:refname | head -1))
              if [[ -z "$TARGET_COMMIT" ]]; then
                echo "❌ No stable tag found"
                exit 1
              fi
              ;;
            *)
              echo "❌ Invalid rollback target: ${{ github.event.inputs.rollback_target }}"
              exit 1
              ;;
          esac
          
          # Verify target commit is different from current
          if [[ "$TARGET_COMMIT" == "${{ steps.get-current.outputs.current_version }}" ]]; then
            echo "❌ Target commit is the same as current deployment"
            exit 1
          fi
          
          # Generate target tag
          TARGET_TAG="main-${TARGET_COMMIT:0:7}"
          
          echo "target_commit=$TARGET_COMMIT" >> $GITHUB_OUTPUT
          echo "target_tag=$TARGET_TAG" >> $GITHUB_OUTPUT
          
          echo "Rollback target: $TARGET_COMMIT"
          echo "Target image tag: $TARGET_TAG"

      - name: Verify target images exist
        run: |
          # Check if the target images exist in the registry
          for service in api web; do
            IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${service}:${{ steps.determine-target.outputs.target_tag }}"
            
            if docker manifest inspect "$IMAGE_NAME" > /dev/null 2>&1; then
              echo "✅ Image exists: $IMAGE_NAME"
            else
              echo "❌ Image not found: $IMAGE_NAME"
              echo "Available tags for ${service}:"
              # This would require additional API calls to list available tags
              exit 1
            fi
          done

  # =============================================
  # Create Rollback Backup
  # =============================================
  create-rollback-backup:
    name: Create Rollback Backup
    runs-on: ubuntu-latest
    needs: validate-rollback
    
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_SSH_KEY || secrets.STAGING_SSH_KEY }}

      - name: Create pre-rollback backup
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            HOST=${{ secrets.PRODUCTION_HOST }}
            USER=${{ secrets.PRODUCTION_USER }}
          else
            HOST=${{ secrets.STAGING_HOST }}
            USER=${{ secrets.STAGING_USER }}
          fi
          
          ssh -o StrictHostKeyChecking=no $USER@$HOST '
            cd /opt/codesenseisearch*
            
            # Create emergency backup before rollback
            BACKUP_NAME="pre_rollback_$(date +%Y%m%d_%H%M%S)"
            echo "Creating emergency backup: $BACKUP_NAME"
            
            ./scripts/backup.sh backup --skip-s3 --no-verify
            
            # Tag the backup as pre-rollback
            LATEST_BACKUP=$(find /var/backups/codesenseisearch -name "*.tar.gz" -type f -printf "%T@ %p\n" | sort -n | tail -1 | cut -d" " -f2-)
            ROLLBACK_BACKUP_PATH="/var/backups/codesenseisearch/rollback_backups/"
            mkdir -p "$ROLLBACK_BACKUP_PATH"
            cp "$LATEST_BACKUP" "${ROLLBACK_BACKUP_PATH}${BACKUP_NAME}.tar.gz"
            
            echo "✅ Pre-rollback backup created: ${ROLLBACK_BACKUP_PATH}${BACKUP_NAME}.tar.gz"
          '

  # =============================================
  # Execute Rollback
  # =============================================
  execute-rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    needs: [validate-rollback, create-rollback-backup]
    
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_SSH_KEY || secrets.STAGING_SSH_KEY }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute rollback deployment
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            HOST=${{ secrets.PRODUCTION_HOST }}
            USER=${{ secrets.PRODUCTION_USER }}
            COMPOSE_FILE="docker-compose.prod.yml"
          else
            HOST=${{ secrets.STAGING_HOST }}
            USER=${{ secrets.STAGING_USER }}
            COMPOSE_FILE="docker-compose.staging.yml"
          fi
          
          TARGET_TAG="${{ needs.validate-rollback.outputs.target_tag }}"
          
          ssh -o StrictHostKeyChecking=no $USER@$HOST "
            cd /opt/codesenseisearch*
            
            echo 'Starting rollback to $TARGET_TAG'
            
            # Update docker-compose to use target images
            sed -i 's|image: .*/codesenseisearch-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:$TARGET_TAG|g' $COMPOSE_FILE
            sed -i 's|image: .*/codesenseisearch-web:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:$TARGET_TAG|g' $COMPOSE_FILE
            
            # Pull target images
            docker-compose -f $COMPOSE_FILE pull
            
            # Perform rolling restart
            echo 'Stopping services...'
            docker-compose -f $COMPOSE_FILE down
            
            echo 'Starting services with rollback version...'
            docker-compose -f $COMPOSE_FILE up -d
            
            echo 'Waiting for services to start...'
            sleep 30
            
            echo '✅ Rollback deployment completed'
          "

      - name: Verify rollback deployment
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            BASE_URL="https://codesenseisearch.com"
            API_URL="https://api.codesenseisearch.com"
          else
            BASE_URL="https://staging.codesenseisearch.com"
            API_URL="https://staging-api.codesenseisearch.com"
          fi
          
          # Wait for services to be ready
          sleep 60
          
          # Health check retries
          for i in {1..5}; do
            echo "Health check attempt $i/5..."
            
            if curl -f "$API_URL/health" && curl -f "$BASE_URL/health"; then
              echo "✅ Rollback verification successful"
              break
            fi
            
            if [[ $i -eq 5 ]]; then
              echo "❌ Rollback verification failed after 5 attempts"
              exit 1
            fi
            
            sleep 30
          done

      - name: Run post-rollback tests
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            BASE_URL="https://codesenseisearch.com"
            API_URL="https://api.codesenseisearch.com"
          else
            BASE_URL="https://staging.codesenseisearch.com"
            API_URL="https://staging-api.codesenseisearch.com"
          fi
          
          # Test basic functionality
          echo "Testing basic functionality..."
          
          # Test search endpoint
          SEARCH_RESPONSE=$(curl -s "$API_URL/api/search?q=test&limit=5")
          if [[ $? -eq 0 ]]; then
            echo "✅ Search endpoint working"
          else
            echo "❌ Search endpoint failed"
            exit 1
          fi
          
          # Test web interface
          WEB_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL")
          if [[ "$WEB_RESPONSE" == "200" ]]; then
            echo "✅ Web interface working"
          else
            echo "❌ Web interface failed (status: $WEB_RESPONSE)"
            exit 1
          fi
          
          echo "✅ Post-rollback tests passed"

  # =============================================
  # Post-Rollback Actions
  # =============================================
  post-rollback-actions:
    name: Post-Rollback Actions
    runs-on: ubuntu-latest
    needs: [validate-rollback, execute-rollback]
    if: always()
    
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_SSH_KEY || secrets.STAGING_SSH_KEY }}

      - name: Log rollback event
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            HOST=${{ secrets.PRODUCTION_HOST }}
            USER=${{ secrets.PRODUCTION_USER }}
          else
            HOST=${{ secrets.STAGING_HOST }}
            USER=${{ secrets.STAGING_USER }}
          fi
          
          ssh -o StrictHostKeyChecking=no $USER@$HOST "
            echo '$(date -u +%Y-%m-%dT%H:%M:%SZ) - Rollback executed by ${{ github.actor }}' >> /var/log/deployments.log
            echo 'From: ${{ needs.validate-rollback.outputs.current_version }}' >> /var/log/deployments.log
            echo 'To: ${{ needs.validate-rollback.outputs.target_commit }}' >> /var/log/deployments.log
            echo 'Reason: ${{ github.event.inputs.reason }}' >> /var/log/deployments.log
            echo 'Status: ${{ needs.execute-rollback.result }}' >> /var/log/deployments.log
            echo '---' >> /var/log/deployments.log
          "

      - name: Create rollback GitHub issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔄 Rollback Executed - ${{ github.event.inputs.environment }}`;
            const body = `
            ## Rollback Summary
            
            **Environment:** ${{ github.event.inputs.environment }}
            **Executed by:** ${{ github.actor }}
            **Date:** ${new Date().toISOString()}
            **Reason:** ${{ github.event.inputs.reason }}
            
            ## Rollback Details
            
            - **From:** \`${{ needs.validate-rollback.outputs.current_version }}\`
            - **To:** \`${{ needs.validate-rollback.outputs.target_commit }}\`
            - **Target:** ${{ github.event.inputs.rollback_target }}
            - **Status:** ✅ Successful
            
            ## Post-Rollback Actions Required
            
            - [ ] Investigate root cause of the issue that required rollback
            - [ ] Update monitoring and alerting if needed
            - [ ] Plan forward fix or next deployment
            - [ ] Review rollback process and improve if necessary
            
            ## Verification
            
            - [x] Health checks passed
            - [x] Basic functionality verified
            - [x] Pre-rollback backup created
            
            **Auto-generated by rollback workflow**
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['rollback', 'incident', 'production']
            });

      - name: Notify team about rollback
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ needs.execute-rollback.result }}
          text: |
            🔄 **Rollback ${{ needs.execute-rollback.result }}**
            
            **Environment:** ${{ github.event.inputs.environment }}
            **Executed by:** ${{ github.actor }}
            **Reason:** ${{ github.event.inputs.reason }}
            
            **From:** `${{ needs.validate-rollback.outputs.current_version }}`
            **To:** `${{ needs.validate-rollback.outputs.target_commit }}`
            
            ${{ needs.execute-rollback.result == 'success' && '✅ Services verified and operational' || '❌ Rollback failed - immediate attention required' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send email notification
        if: always()
        run: |
          # This would integrate with your email service
          echo "Rollback notification sent via email"
          # Example: Send email using your preferred email service API