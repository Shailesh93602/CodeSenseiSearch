name: Backup Verification & Maintenance

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # =============================================
  # Verify Backup Integrity
  # =============================================
  verify-backups:
    name: Verify Backup Integrity
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Verify latest backup
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            cd /opt/codesenseisearch
            # Run backup verification script
            ./scripts/backup.sh verify $(find /var/backups/codesenseisearch -name "*.tar.gz" -type f -printf "%T@ %p\n" | sort -n | tail -1 | cut -d" " -f2-)
          '

      - name: Test backup restore
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            cd /opt/codesenseisearch
            # Create test environment for restore verification
            LATEST_BACKUP=$(find /var/backups/codesenseisearch -name "*.tar.gz" -type f -printf "%T@ %p\n" | sort -n | tail -1 | cut -d" " -f2-)
            TEST_DIR="/tmp/backup_test_$(date +%s)"
            
            # Extract backup to test directory
            ./scripts/backup.sh restore "$LATEST_BACKUP" "$TEST_DIR"
            
            # Verify backup contents
            if [[ -f "$TEST_DIR/$(basename "$LATEST_BACKUP" .tar.gz)/manifest.json" ]]; then
              echo "✅ Backup manifest found"
            else
              echo "❌ Backup manifest missing"
              exit 1
            fi
            
            if [[ -f "$TEST_DIR/$(basename "$LATEST_BACKUP" .tar.gz)/database/postgres_dump.sql.gz" ]]; then
              echo "✅ Database dump found"
            else
              echo "❌ Database dump missing"
              exit 1
            fi
            
            # Cleanup test directory
            rm -rf "$TEST_DIR"
            echo "✅ Backup verification completed successfully"
          '

      - name: Check backup age
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            LATEST_BACKUP=$(find /var/backups/codesenseisearch -name "*.tar.gz" -type f -printf "%T@ %p\n" | sort -n | tail -1 | cut -d" " -f2-)
            if [[ -n "$LATEST_BACKUP" ]]; then
              BACKUP_AGE=$(( $(date +%s) - $(stat -c %Y "$LATEST_BACKUP") ))
              BACKUP_AGE_HOURS=$(( BACKUP_AGE / 3600 ))
              
              if [[ $BACKUP_AGE_HOURS -gt 25 ]]; then
                echo "❌ Latest backup is $BACKUP_AGE_HOURS hours old (should be < 25 hours)"
                exit 1
              else
                echo "✅ Latest backup is $BACKUP_AGE_HOURS hours old"
              fi
            else
              echo "❌ No backups found"
              exit 1
            fi
          '

      - name: Notify backup status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: "Backup verification ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================
  # System Health Monitoring
  # =============================================
  health-monitoring:
    name: System Health Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Run comprehensive health check
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            cd /opt/codesenseisearch
            # Run health check script
            ./scripts/health-check.sh full
          '

      - name: Check SSL certificate expiry
        run: |
          echo | openssl s_client -servername codesenseisearch.com -connect codesenseisearch.com:443 2>/dev/null | openssl x509 -noout -dates
          
          # Check if certificate expires in less than 30 days
          EXPIRY_DATE=$(echo | openssl s_client -servername codesenseisearch.com -connect codesenseisearch.com:443 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2)
          EXPIRY_EPOCH=$(date -d "$EXPIRY_DATE" +%s)
          CURRENT_EPOCH=$(date +%s)
          DAYS_UNTIL_EXPIRY=$(( (EXPIRY_EPOCH - CURRENT_EPOCH) / 86400 ))
          
          if [[ $DAYS_UNTIL_EXPIRY -lt 30 ]]; then
            echo "⚠️ SSL certificate expires in $DAYS_UNTIL_EXPIRY days"
            # Trigger certificate renewal if needed
            ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
              cd /opt/codesenseisearch
              sudo ./docker/ssl/generate-cert.sh renew
            '
          else
            echo "✅ SSL certificate is valid for $DAYS_UNTIL_EXPIRY more days"
          fi

      - name: Check disk space
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            DISK_USAGE=$(df / | tail -1 | awk "{print \$5}" | sed "s/%//")
            if [[ $DISK_USAGE -gt 85 ]]; then
              echo "❌ High disk usage: ${DISK_USAGE}%"
              exit 1
            else
              echo "✅ Disk usage normal: ${DISK_USAGE}%"
            fi
          '

      - name: Check memory usage
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            MEMORY_USAGE=$(free | grep "Mem:" | awk "{printf \"%.0f\", \$3/\$2 * 100.0}")
            if [[ $MEMORY_USAGE -gt 90 ]]; then
              echo "❌ High memory usage: ${MEMORY_USAGE}%"
              exit 1
            else
              echo "✅ Memory usage normal: ${MEMORY_USAGE}%"
            fi
          '

      - name: Notify health status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: "System health check ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================
  # Performance Monitoring
  # =============================================
  performance-monitoring:
    name: Performance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: API Performance Test
        run: |
          # Test API response times
          API_RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' https://api.codesenseisearch.com/health)
          WEB_RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' https://codesenseisearch.com)
          
          echo "API Response Time: ${API_RESPONSE_TIME}s"
          echo "Web Response Time: ${WEB_RESPONSE_TIME}s"
          
          # Check if response times are acceptable (< 2 seconds)
          if (( $(echo "$API_RESPONSE_TIME > 2" | bc -l) )); then
            echo "❌ API response time too slow: ${API_RESPONSE_TIME}s"
            exit 1
          fi
          
          if (( $(echo "$WEB_RESPONSE_TIME > 2" | bc -l) )); then
            echo "❌ Web response time too slow: ${WEB_RESPONSE_TIME}s"
            exit 1
          fi
          
          echo "✅ Response times within acceptable limits"

      - name: Database Performance Check
        run: |
          # This would typically connect to a monitoring endpoint
          # For now, we'll simulate with a simple API call
          curl -f https://api.codesenseisearch.com/api/search?q=test&limit=5 > /dev/null
          echo "✅ Database performance check passed"

  # =============================================
  # Cleanup and Maintenance
  # =============================================
  maintenance:
    name: System Maintenance
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Clean up old Docker images
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            # Remove unused Docker images older than 7 days
            docker image prune -a --filter "until=168h" -f
            
            # Remove unused volumes
            docker volume prune -f
            
            # Remove unused networks
            docker network prune -f
            
            echo "✅ Docker cleanup completed"
          '

      - name: Clean up old logs
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            # Clean up old logs (older than 30 days)
            find /var/log -name "*.log" -type f -mtime +30 -delete 2>/dev/null || true
            find /var/log -name "*.log.gz" -type f -mtime +30 -delete 2>/dev/null || true
            
            # Truncate large log files
            find /var/log -name "*.log" -type f -size +100M -exec truncate -s 50M {} \;
            
            echo "✅ Log cleanup completed"
          '

      - name: Update system packages
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            # Update package lists
            sudo apt update
            
            # Upgrade security packages only
            sudo apt list --upgradable | grep -i security | cut -d"/" -f1 | xargs sudo apt install -y
            
            # Clean up package cache
            sudo apt autoremove -y
            sudo apt autoclean
            
            echo "✅ System package update completed"
          '

      - name: Optimize database
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            cd /opt/codesenseisearch
            
            # Run database optimization
            docker-compose exec -T postgres psql -U postgres -d codesenseisearch -c "VACUUM ANALYZE;"
            
            echo "✅ Database optimization completed"
          '

      - name: Notify maintenance completion
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: "System maintenance ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================
  # Generate System Report
  # =============================================
  system-report:
    name: Generate System Report
    runs-on: ubuntu-latest
    needs: [verify-backups, health-monitoring, performance-monitoring, maintenance]
    if: always() && github.ref == 'refs/heads/main'
    
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Generate comprehensive report
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} '
            cd /opt/codesenseisearch
            
            # Generate system report
            REPORT_FILE="/tmp/system_report_$(date +%Y%m%d_%H%M%S).txt"
            
            echo "CodeSenseiSearch System Report - $(date)" > $REPORT_FILE
            echo "=============================================" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            
            echo "System Information:" >> $REPORT_FILE
            echo "- Hostname: $(hostname)" >> $REPORT_FILE
            echo "- Uptime: $(uptime)" >> $REPORT_FILE
            echo "- Disk Usage: $(df -h / | tail -1)" >> $REPORT_FILE
            echo "- Memory Usage: $(free -h | grep Mem)" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            
            echo "Docker Status:" >> $REPORT_FILE
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            
            echo "Service Health:" >> $REPORT_FILE
            ./scripts/health-check.sh quick >> $REPORT_FILE 2>&1
            echo "" >> $REPORT_FILE
            
            echo "Recent Backups:" >> $REPORT_FILE
            ls -la /var/backups/codesenseisearch/*.tar.gz | tail -5 >> $REPORT_FILE 2>/dev/null || echo "No backups found" >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            
            echo "Security Updates Available:" >> $REPORT_FILE
            apt list --upgradable 2>/dev/null | grep -i security | wc -l >> $REPORT_FILE
            echo "" >> $REPORT_FILE
            
            # Display report
            cat $REPORT_FILE
            
            # Send report via email if configured
            if command -v mail &> /dev/null && [[ -n "$NOTIFICATION_EMAIL" ]]; then
              mail -s "CodeSenseiSearch Daily System Report" "$NOTIFICATION_EMAIL" < $REPORT_FILE
            fi
            
            # Cleanup
            rm -f $REPORT_FILE
          '

      - name: Notify report generation
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: "Daily system report generated ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}